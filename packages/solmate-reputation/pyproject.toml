[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "solmate-reputation"
version = "0.1.0"
description = "Portable on-chain reputation decay with Hedera HCS anchoring for Web3 social apps"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "AINative Studio", email = "hello@ainative.studio" }]
keywords = ["reputation", "hedera", "hcs", "solana", "web3", "social", "decay", "trust"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: Libraries",
]
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.24.0",
]

[project.optional-dependencies]
dev = ["pytest>=7", "pytest-asyncio>=0.21"]

[project.urls]
Homepage = "https://github.com/AINative-Studio/sol-mate-trust-api"
Repository = "https://github.com/AINative-Studio/sol-mate-trust-api/tree/main/packages/solmate-reputation"
