[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "x402-solana"
version = "0.1.0"
description = "FastAPI middleware for Coinbase x402 HTTP payment protocol on Base USDC"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "AINative Studio", email = "hello@ainative.studio" }]
keywords = ["x402", "payments", "base", "usdc", "fastapi", "coinbase", "solana", "web3"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Framework :: FastAPI",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Internet :: WWW/HTTP :: HTTP Servers",
]
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.100.0",
    "httpx>=0.24.0",
]

[project.optional-dependencies]
dev = ["pytest>=7", "pytest-asyncio>=0.21", "httpx"]

[project.urls]
Homepage = "https://github.com/AINative-Studio/sol-mate-trust-api"
Repository = "https://github.com/AINative-Studio/sol-mate-trust-api/tree/main/packages/x402-solana"
