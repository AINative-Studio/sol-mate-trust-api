[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "solmate-stake-sdk"
version = "0.1.0"
description = "Stake-gated access control for Web3 social apps — stake lifecycle, slashing policy, no-show multipliers"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "AINative Studio", email = "hello@ainative.studio" }]
keywords = ["stake", "solana", "usdc", "web3", "social", "access-control", "slashing", "escrow"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: Libraries",
]
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7"]

[project.urls]
Homepage = "https://github.com/AINative-Studio/sol-mate-trust-api"
Repository = "https://github.com/AINative-Studio/sol-mate-trust-api/tree/main/packages/solmate-stake-sdk"
